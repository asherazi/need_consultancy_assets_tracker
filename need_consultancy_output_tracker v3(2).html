<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Need Consultancy — Output Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0D0D0D; --card: #161616; --card2: #1C1C1C; --border: #242424;
    --accent: #E8C547; --accent-dim: rgba(232,197,71,0.12); --accent-glow: rgba(232,197,71,0.06);
    --text: #F0F0F0; --text-dim: #666; --text-mid: #999;
    --green: #4ADE80; --green-dim: rgba(74,222,128,0.12);
    --blue: #60A5FA; --blue-dim: rgba(96,165,250,0.12);
    --red: #F87171; --red-dim: rgba(248,113,113,0.12);
  }
  html, body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; font-size: 14px; -webkit-font-smoothing: antialiased; }
  input, select, textarea, button { font-family: inherit; }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent) !important; box-shadow: 0 0 0 3px var(--accent-glow); }
  select option { background: #1C1C1C; }
  ::-webkit-scrollbar { width: 4px; height: 4px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .app { display: flex; flex-direction: column; min-height: 100vh; }
  .header { border-bottom: 1px solid var(--border); padding: 0 28px; position: sticky; top: 0; background: rgba(13,13,13,0.95); backdrop-filter: blur(8px); z-index: 100; }
  .header-inner { max-width: 1000px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 56px; }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-bar { background: var(--accent); width: 4px; height: 26px; border-radius: 2px; }
  .logo-text { display: flex; flex-direction: column; gap: 1px; }
  .logo-name { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 14px; letter-spacing: 0.06em; color: var(--text); }
  .logo-sub { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--text-dim); letter-spacing: 0.14em; }
  .header-date { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim); }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); display: inline-block; margin-left: 8px; }
  .sync-dot.syncing { background: var(--accent); animation: pulse 1s infinite; }
  .sync-dot.error { background: var(--red); }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  .tabs { border-bottom: 1px solid var(--border); padding: 0 28px; background: var(--bg); }
  .tabs-inner { max-width: 1000px; margin: 0 auto; display: flex; }
  .tab { background: none; border: none; border-bottom: 2px solid transparent; padding: 14px 20px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim); cursor: pointer; transition: all 0.2s; margin-bottom: -1px; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab:hover:not(.active) { color: var(--text-mid); }
  .content { max-width: 1000px; margin: 0 auto; padding: 36px 28px; flex: 1; width: 100%; }
  .field-label { display: block; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 8px; }
  .field-input { width: 100%; background: var(--card2); border: 1px solid var(--border); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; padding: 10px 14px; border-radius: 5px; transition: border-color 0.2s, box-shadow 0.2s; }
  .field-input::placeholder { color: var(--text-dim); }
  .field-input[type="date"] { color-scheme: dark; }
  .field-input[type="url"] { color: var(--blue); }
  .toggle-group { display: flex; background: var(--card2); border: 1px solid var(--border); border-radius: 5px; overflow: hidden; }
  .toggle-btn { flex: 1; padding: 9px 8px; border: none; background: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text-dim); transition: all 0.15s; }
  .toggle-btn.active { color: var(--accent); background: var(--accent-dim); font-weight: 500; }
  .btn-primary { background: var(--accent); color: #0D0D0D; border: none; padding: 12px 28px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px; letter-spacing: 0.06em; cursor: pointer; border-radius: 5px; transition: opacity 0.2s, transform 0.1s; width: 100%; }
  .btn-primary:hover:not(:disabled) { opacity: 0.88; }
  .btn-primary:active:not(:disabled) { transform: scale(0.99); }
  .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-ghost { background: none; border: 1px solid var(--border); color: var(--text-mid); padding: 9px 18px; font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; border-radius: 5px; transition: all 0.2s; }
  .btn-ghost:hover { border-color: var(--text-dim); color: var(--text); }
  .btn-ghost-sm { background: none; border: 1px solid var(--border); color: var(--text-mid); padding: 7px 14px; font-family: 'DM Sans', sans-serif; font-size: 12px; cursor: pointer; border-radius: 4px; transition: all 0.2s; }
  .btn-ghost-sm:hover { border-color: var(--accent); color: var(--accent); }
  .btn-remove { background: none; border: 1px solid transparent; color: var(--text-dim); padding: 4px 10px; font-family: 'DM Sans', sans-serif; font-size: 12px; cursor: pointer; border-radius: 4px; transition: all 0.15s; }
  .btn-remove:hover { border-color: var(--red-dim); color: var(--red); background: var(--red-dim); }
  .task-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 18px; transition: border-color 0.2s; margin-bottom: 12px; }
  .task-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .task-num { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim); letter-spacing: 0.1em; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
  .stat-num { font-family: 'JetBrains Mono', monospace; font-size: 38px; font-weight: 500; color: var(--accent); line-height: 1; margin-bottom: 6px; }
  .stat-label { font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--text-dim); }
  .data-table { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; border-collapse: collapse; }
  .data-table th { padding: 11px 16px; text-align: left; font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--text-dim); letter-spacing: 0.12em; font-weight: 400; border-bottom: 1px solid var(--border); background: rgba(255,255,255,0.01); }
  .data-table td { padding: 13px 16px; border-bottom: 1px solid var(--border); }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table tr:hover td { background: rgba(255,255,255,0.01); }
  .data-num { font-family: 'JetBrains Mono', monospace; font-size: 15px; }
  .data-name { font-family: 'Syne', sans-serif; font-weight: 600; font-size: 14px; }
  .role-tag { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim); }
  .badge { display: inline-block; padding: 2px 7px; border-radius: 3px; font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.06em; text-transform: uppercase; }
  .badge-client { background: var(--green-dim); color: var(--green); }
  .badge-internal { background: var(--blue-dim); color: var(--blue); }
  .badge-video { background: var(--accent-dim); color: var(--accent); }
  .badge-graphic { background: var(--red-dim); color: var(--red); }
  .section-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 20px; }
  .section-sub { font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text-dim); margin-top: 4px; }
  .table-header-bar { display: flex; justify-content: space-between; align-items: center; padding: 14px 20px; border-bottom: 1px solid var(--border); }
  .table-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px; }
  .log-item { padding: 14px 20px; border-bottom: 1px solid var(--border); }
  .log-item:last-child { border-bottom: none; }
  .log-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .log-name { font-family: 'Syne', sans-serif; font-weight: 600; font-size: 14px; }
  .log-date { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim); }
  .log-tasks { display: flex; flex-wrap: wrap; gap: 6px; }
  .log-task-pill { display: flex; align-items: center; gap: 6px; background: var(--card2); border-radius: 5px; padding: 5px 10px; }
  .log-task-name { font-size: 13px; color: var(--text-mid); }
  .log-task-qty { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--accent); }
  .drive-link { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--blue); text-decoration: none; }
  .drive-link:hover { text-decoration: underline; }
  .success-msg { background: var(--green-dim); border: 1px solid rgba(74,222,128,0.25); border-radius: 6px; padding: 12px 16px; color: var(--green); font-size: 14px; margin-bottom: 16px; }
  .error-msg { background: var(--red-dim); border: 1px solid rgba(248,113,113,0.25); border-radius: 6px; padding: 12px 16px; color: var(--red); font-size: 14px; margin-bottom: 16px; }
  .pin-screen { max-width: 340px; margin: 60px auto; text-align: center; }
  .pin-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 20px; margin-bottom: 8px; }
  .pin-sub { color: var(--text-dim); font-size: 14px; margin-bottom: 28px; }
  .pin-hint { margin-top: 16px; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #333; }
  .empty { padding: 32px; text-align: center; color: var(--text-dim); font-size: 14px; }
  .loading-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 16px; }
  .loading-spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-dim); }
  .bar-wrap { display: flex; align-items: center; gap: 8px; }
  .bar-bg { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 2px; background: var(--accent); }
  .insight-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 18px 20px; display: flex; align-items: flex-start; gap: 14px; margin-bottom: 12px; }
  .insight-icon { font-size: 18px; flex-shrink: 0; margin-top: 2px; }
  .insight-body { flex: 1; }
  .insight-title { font-family: 'Syne', sans-serif; font-weight: 600; font-size: 13px; margin-bottom: 4px; }
  .insight-text { font-size: 13px; color: var(--text-dim); line-height: 1.5; }
  .settings-section { background: var(--card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 20px; }
  .settings-header { padding: 16px 20px; border-bottom: 1px solid var(--border); }
  .settings-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; }
  .settings-body { padding: 20px; }
  .pill-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; min-height: 32px; }
  .pill-item { display: flex; align-items: center; gap: 6px; background: var(--card2); border: 1px solid var(--border); border-radius: 20px; padding: 5px 12px; font-size: 13px; }
  .pill-role { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--text-dim); }
  .pill-remove { background: none; border: none; cursor: pointer; color: var(--text-dim); font-size: 14px; padding: 0 0 0 4px; line-height: 1; transition: color 0.15s; }
  .pill-remove:hover { color: var(--red); }
  .add-row { display: flex; gap: 8px; }
  .add-row .field-input { flex: 1; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in { animation: fadeIn 0.3s ease forwards; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  @media (max-width: 600px) {
    .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
    .content { padding: 20px 16px; }
    .header { padding: 0 16px; }
    .tabs { padding: 0 16px; }
    .tab { padding: 14px 12px; font-size: 10px; }
    .data-table { font-size: 12px; }
    .data-table th, .data-table td { padding: 10px 10px; }
  }
</style>
</head>
<body>
<div id="app"></div>
<script>
// ─── SUPABASE CONFIG ──────────────────────────────────────────────────────────
const SUPABASE_URL = "https://ejgsjrnponrrrlkacekt.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVqZ3Nqcm5wb25ycnJsa2FjZWt0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2OTU5NjcsImV4cCI6MjA5MDI3MTk2N30.M7HuxHXGOyT8nUWPKScAG46aGc3INmYVd89x7J8MZFc";

const DEFAULT_CONFIG = {
  pin: "1234",
  team: [
    { id: "e1", name: "Editor 1", role: "editor" },
    { id: "e2", name: "Editor 2", role: "editor" },
    { id: "e3", name: "Editor 3", role: "editor" },
    { id: "e4", name: "Editor 4", role: "editor" },
    { id: "d1", name: "Designer", role: "designer" },
  ],
  clients: ["Client A", "Client B"],
  internal_projects: ["Own Brand Content", "Agency Showreel"],
};

// ─── SUPABASE API ─────────────────────────────────────────────────────────────
async function sbFetch(path, method = "GET", body = null) {
  const opts = {
    method,
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json",
      "Prefer": method === "POST" ? "return=representation" : "",
    },
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, opts);
  if (!res.ok) { const err = await res.text(); throw new Error(err); }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function getConfig() {
  const rows = await sbFetch("config?id=eq.1&select=*");
  if (rows && rows.length > 0) return rows[0];
  return null;
}

async function upsertConfig(cfg) {
  await sbFetch("config?id=eq.1", "PATCH", {
    pin: cfg.pin,
    team: cfg.team,
    clients: cfg.clients,
    internal_projects: cfg.internal_projects,
  });
}

async function getEntries() {
  return await sbFetch("entries?select=*&order=submitted_at.desc");
}

async function insertEntry(entry) {
  return await sbFetch("entries", "POST", {
    id: entry.id,
    member_id: entry.memberId,
    member_name: entry.memberName,
    role: entry.role,
    date: entry.date,
    tasks: entry.tasks,
    submitted_at: entry.submittedAt,
  });
}

// ─── UTILS ───────────────────────────────────────────────────────────────────
function todayStr() { return new Date().toISOString().slice(0, 10); }
function fmtDate(d) {
  if (!d) return "—";
  return new Date(d + "T00:00:00").toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric" });
}
function monthLabel(ym) { const [y, m] = ym.split("-"); return new Date(+y, +m - 1, 1).toLocaleDateString("en-GB", { month: "long", year: "numeric" }); }
function getMonthOptions() {
  const opts = []; const now = new Date();
  for (let i = 0; i < 6; i++) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    opts.push(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`);
  }
  return opts;
}
function getWeekStart(date) {
  const d = new Date(date);
  const day = d.getDay(); // 0=Sun
  const diff = d.getDate() - day + (day === 0 ? -6 : 1); // Monday
  d.setDate(diff); return d.toISOString().slice(0, 10);
}
function getWeekEnd(weekStartStr) {
  const d = new Date(weekStartStr + "T00:00:00");
  d.setDate(d.getDate() + 6); return d.toISOString().slice(0, 10);
}
function getWeekOptions() {
  const opts = []; const now = new Date();
  for (let i = 0; i < 12; i++) {
    const d = new Date(now); d.setDate(d.getDate() - i * 7);
    opts.push(getWeekStart(d));
  }
  return [...new Set(opts)];
}
function fmtWeekLabel(weekStartStr) {
  const start = new Date(weekStartStr + "T00:00:00");
  const end = new Date(weekStartStr + "T00:00:00"); end.setDate(end.getDate() + 6);
  const fmt = d => d.toLocaleDateString("en-GB", { day: "numeric", month: "short" });
  return `${fmt(start)} – ${fmt(end)}`;
}
function getDayOptions() {
  const opts = []; const now = new Date();
  for (let i = 0; i < 30; i++) {
    const d = new Date(now); d.setDate(d.getDate() - i);
    opts.push(d.toISOString().slice(0, 10));
  }
  return opts;
}
function emptyTask() { return { id: uid(), project: "", projectType: "client", contentType: "video", quantity: 1, driveLink: "", notes: "" }; }

// ─── STATE ────────────────────────────────────────────────────────────────────
let state = {
  loaded: false, tab: "log", syncStatus: "ok",
  entries: [], config: DEFAULT_CONFIG,
  member: "", date: todayStr(), tasks: [emptyTask()],
  submitting: false, justSubmitted: false, submitError: "",
  pinUnlocked: false, pin: "", pinErr: false,
  dashView: "monthly", // "daily" | "weekly" | "monthly"
  selectedMonth: getMonthOptions()[0],
  selectedDate: todayStr(),
  selectedWeek: getWeekStart(new Date()),
  newMemberName: "", newMemberRole: "editor",
  newClient: "", newInternal: "",
  newPin: "", newPin2: "", pinChangeMsg: "",
  settingsSaved: false, settingsError: "",
};

function setState(patch) { Object.assign(state, patch); render(); }

// ─── INIT ─────────────────────────────────────────────────────────────────────
async function init() {
  try {
    const [cfgRow, entries] = await Promise.all([getConfig(), getEntries()]);
    const config = cfgRow ? {
      pin: cfgRow.pin || "1234",
      team: cfgRow.team || DEFAULT_CONFIG.team,
      clients: cfgRow.clients || DEFAULT_CONFIG.clients,
      internal_projects: cfgRow.internal_projects || DEFAULT_CONFIG.internal_projects,
    } : DEFAULT_CONFIG;
    // Normalise entries from DB shape
    const normEntries = (entries || []).map(e => ({
      id: e.id, memberId: e.member_id, memberName: e.member_name,
      role: e.role, date: e.date, tasks: e.tasks, submittedAt: e.submitted_at,
    }));
    setState({ loaded: true, entries: normEntries, config, syncStatus: "ok" });
  } catch (err) {
    console.error(err);
    setState({ loaded: true, syncStatus: "error" });
  }
}

// ─── ACTIONS ──────────────────────────────────────────────────────────────────
async function submitLog() {
  if (!state.member || state.tasks.some(t => !t.project.trim())) return;
  setState({ submitting: true, submitError: "" });
  const m = state.config.team.find(x => x.id === state.member);
  const entry = {
    id: uid(), memberId: state.member, memberName: m?.name, role: m?.role,
    date: state.date, tasks: state.tasks, submittedAt: new Date().toISOString(),
  };
  try {
    setState({ syncStatus: "syncing" });
    await insertEntry(entry);
    const newEntries = [entry, ...state.entries];
    setState({ submitting: false, justSubmitted: true, entries: newEntries, member: "", tasks: [emptyTask()], date: todayStr(), syncStatus: "ok" });
    setTimeout(() => setState({ justSubmitted: false }), 4000);
  } catch (err) {
    setState({ submitting: false, submitError: "Failed to save. Check your connection and try again.", syncStatus: "error" });
  }
}

async function saveConfig(cfg) {
  setState({ syncStatus: "syncing", settingsError: "" });
  try {
    await upsertConfig(cfg);
    setState({ config: cfg, settingsSaved: true, syncStatus: "ok" });
    setTimeout(() => setState({ settingsSaved: false }), 2500);
  } catch (err) {
    setState({ settingsError: "Failed to save settings. Check your connection.", syncStatus: "error" });
  }
}

function checkPin() {
  if (state.pin === state.config.pin) setState({ pinUnlocked: true, pinErr: false, pin: "" });
  else setState({ pinErr: true, pin: "" });
}

function updateTask(id, field, value) { setState({ tasks: state.tasks.map(t => t.id === id ? { ...t, [field]: value } : t) }); }
function addTask() { setState({ tasks: [...state.tasks, emptyTask()] }); }
function removeTask(id) { setState({ tasks: state.tasks.filter(t => t.id !== id) }); }

function addMember() {
  if (!state.newMemberName.trim()) return;
  const cfg = { ...state.config, team: [...state.config.team, { id: uid(), name: state.newMemberName.trim(), role: state.newMemberRole }] };
  setState({ newMemberName: "" });
  saveConfig(cfg);
}
function removeMember(id) { saveConfig({ ...state.config, team: state.config.team.filter(m => m.id !== id) }); }
function addClient() {
  const val = state.newClient.trim();
  if (!val || state.config.clients.includes(val)) { setState({ newClient: "" }); return; }
  saveConfig({ ...state.config, clients: [...state.config.clients, val] });
  setState({ newClient: "" });
}
function removeClient(c) { saveConfig({ ...state.config, clients: state.config.clients.filter(x => x !== c) }); }
function addInternal() {
  const val = state.newInternal.trim();
  if (!val || state.config.internal_projects.includes(val)) { setState({ newInternal: "" }); return; }
  saveConfig({ ...state.config, internal_projects: [...state.config.internal_projects, val] });
  setState({ newInternal: "" });
}
function removeInternal(p) { saveConfig({ ...state.config, internal_projects: state.config.internal_projects.filter(x => x !== p) }); }
function changePin() {
  if (!state.newPin || state.newPin.length < 4) { setState({ pinChangeMsg: "err:PIN must be at least 4 characters." }); return; }
  if (state.newPin !== state.newPin2) { setState({ pinChangeMsg: "err:PINs don't match." }); return; }
  const cfg = { ...state.config, pin: state.newPin };
  saveConfig(cfg);
  setState({ newPin: "", newPin2: "", pinChangeMsg: "ok:PIN updated successfully." });
  setTimeout(() => setState({ pinChangeMsg: "" }), 3000);
}

// ─── DASHBOARD STATS ──────────────────────────────────────────────────────────
function computeStats() {
  let filteredEntries, periodLabel, submissionCount;

  if (state.dashView === "daily") {
    filteredEntries = state.entries.filter(e => e.date === state.selectedDate);
    periodLabel = fmtDate(state.selectedDate);
  } else if (state.dashView === "weekly") {
    const wEnd = getWeekEnd(state.selectedWeek);
    filteredEntries = state.entries.filter(e => e.date >= state.selectedWeek && e.date <= wEnd);
    periodLabel = fmtWeekLabel(state.selectedWeek);
  } else {
    filteredEntries = state.entries.filter(e => e.date && e.date.startsWith(state.selectedMonth));
    periodLabel = monthLabel(state.selectedMonth);
  }

  submissionCount = filteredEntries.length;

  const memberStats = state.config.team.map(m => {
    const me = filteredEntries.filter(e => e.memberId === m.id);
    const allTasks = me.flatMap(e => e.tasks || []);
    const videos = allTasks.filter(t => t.contentType === "video").reduce((a, t) => a + Number(t.quantity || 0), 0);
    const graphics = allTasks.filter(t => t.contentType === "graphic").reduce((a, t) => a + Number(t.quantity || 0), 0);
    const clientWork = allTasks.filter(t => t.projectType === "client").reduce((a, t) => a + Number(t.quantity || 0), 0);
    const internalWork = allTasks.filter(t => t.projectType === "internal").reduce((a, t) => a + Number(t.quantity || 0), 0);
    const daysLogged = new Set(me.map(e => e.date)).size;
    return { ...m, videos, graphics, total: videos + graphics, clientWork, internalWork, daysLogged };
  });
  const totalVideos = memberStats.reduce((a, m) => a + m.videos, 0);
  const totalGraphics = memberStats.reduce((a, m) => a + m.graphics, 0);
  const totalOutput = totalVideos + totalGraphics;
  const clientTotal = memberStats.reduce((a, m) => a + m.clientWork, 0);
  const clientPct = totalOutput > 0 ? Math.round((clientTotal / totalOutput) * 100) : 0;
  const maxTotal = Math.max(...memberStats.map(m => m.total), 1);
  const recentEntries = [...filteredEntries].sort((a, b) => (b.submittedAt || "").localeCompare(a.submittedAt || "")).slice(0, 15);
  return { memberStats, totalVideos, totalGraphics, totalOutput, clientPct, maxTotal, recentEntries, submissionCount, periodLabel };
}

// ─── DOM HELPERS ──────────────────────────────────────────────────────────────
function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k, v]) => {
    if (k === "class") e.className = v;
    else if (k === "style" && typeof v === "object") Object.assign(e.style, v);
    else if (k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(), v);
    else e.setAttribute(k, v);
  });
  children.flat(Infinity).forEach(c => {
    if (c == null || c === false) return;
    e.appendChild(c instanceof Node ? c : document.createTextNode(String(c)));
  });
  return e;
}
function div(cls, ...ch) { return el("div", { class: cls }, ...ch); }
function span(cls, t) { return el("span", { class: cls }, t); }
function lbl(text) { return el("label", { class: "field-label" }, text); }
function field(labelText, input) { const w = div(""); w.appendChild(lbl(labelText)); w.appendChild(input); return w; }

  iI.addEventListener("keydown", e => { if (e.key === "Enter") addInternal(); });
  addIRow.appendChild(iI); addIRow.appendChild(el("button", { class: "btn-ghost-sm", onClick: addInternal }, "+ Add"));
  iBody.appendChild(addIRow); iSec.appendChild(iBody); wrap.appendChild(iSec);

  // PIN
  const pSec = div("settings-section");
  pSec.appendChild(el("div", { class: "settings-header" }, el("span", { class: "settings-title" }, "Change Dashboard PIN")));
  const pBody = div("settings-body");
  const pGrid = div("grid-3");
  const p1 = el("input", { class: "field-input", type: "password", placeholder: "New PIN", value: state.newPin });
  p1.addEventListener("input", e => { state.newPin = e.target.value; });
  const p2 = el("input", { class: "field-input", type: "password", placeholder: "Confirm PIN", value: state.newPin2 });
  p2.addEventListener("input", e => { state.newPin2 = e.target.value; });
  p2.addEventListener("keydown", e => { if (e.key === "Enter") changePin(); });
  pGrid.appendChild(field("New PIN", p1)); pGrid.appendChild(field("Confirm PIN", p2));
  pGrid.appendChild(el("div", { style: { display: "flex", alignItems: "flex-end" } }, el("button", { class: "btn-ghost-sm", style: { width: "100%" }, onClick: changePin }, "Update PIN")));
  pBody.appendChild(pGrid);
  if (state.pinChangeMsg) {
    const isOk = state.pinChangeMsg.startsWith("ok:");
    pBody.appendChild(el("p", { style: { marginTop: "10px", fontSize: "13px", color: isOk ? "var(--green)" : "var(--red)" } }, state.pinChangeMsg.slice(3)));
  }
  pSec.appendChild(pBody); wrap.appendChild(pSec);
  return el("div", { class: "content" }, wrap);
}

// ─── RENDER: PIN ──────────────────────────────────────────────────────────────
function renderPin() {
  const wrap = div("pin-screen fade-in");
  wrap.appendChild(el("div", { style: { fontSize: "32px", marginBottom: "16px" } }, "🔒"));
  wrap.appendChild(el("p", { class: "pin-title" }, "Manager Access"));
  wrap.appendChild(el("p", { class: "pin-sub" }, "Enter your PIN to continue."));
  const pi = el("input", { class: "field-input", type: "password", maxlength: "20", placeholder: "••••", autocomplete: "off", style: { textAlign: "center", fontSize: "22px", letterSpacing: "0.4em", marginBottom: "10px" } });
  pi.value = state.pin;
  pi.addEventListener("input", e => { state.pin = e.target.value; });
  pi.addEventListener("keydown", e => { if (e.key === "Enter") checkPin(); });
  wrap.appendChild(pi);
  if (state.pinErr) wrap.appendChild(el("p", { style: { color: "var(--red)", fontSize: "13px", marginBottom: "10px" } }, "Incorrect PIN. Try again."));
  else wrap.appendChild(el("div", { style: { height: "10px" } }));
  wrap.appendChild(el("button", { class: "btn-primary", onClick: checkPin }, "Unlock"));
  wrap.appendChild(el("p", { class: "pin-hint" }, "Default PIN: 1234"));
  return el("div", { class: "content" }, wrap);
}

// ─── MAIN RENDER ──────────────────────────────────────────────────────────────
function render() {
  const root = document.getElementById("app");
  root.innerHTML = "";
  if (!state.loaded) {
    const app = div("app");
    app.appendChild(renderHeader());
    const loading = div("loading-screen");
    loading.appendChild(el("div", { class: "loading-spinner" }));
    loading.appendChild(el("span", { class: "loading-text" }, "Connecting to cloud…"));
    app.appendChild(el("div", { class: "content" }, loading));
    root.appendChild(app);
    return;
  }
  const app = div("app");
  app.appendChild(renderHeader());

  const tabsEl = el("div", { class: "tabs" });
  const tabsInner = el("div", { class: "tabs-inner" });
  [{ id: "log", label: "Log Work" }, { id: "dash", label: "Dashboard" }, { id: "settings", label: "⚙ Settings" }].forEach(t => {
    tabsInner.appendChild(el("button", { class: `tab ${state.tab === t.id ? "active" : ""}`, onClick: () => setState({ tab: t.id }) }, t.label));
  });
  tabsEl.appendChild(tabsInner); app.appendChild(tabsEl);

  if (state.tab === "log") app.appendChild(renderLog());
  else if (state.tab === "dash") app.appendChild(state.pinUnlocked ? renderDashboard() : renderPin());
  else if (state.tab === "settings") app.appendChild(state.pinUnlocked ? renderSettings() : renderPin());

  root.appendChild(app);
}

init();
</script>
</body>
</html>
