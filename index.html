<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Need Consultancy — Output Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0D0D0D;--card:#161616;--card2:#1C1C1C;--border:#242424;
    --accent:#E8C547;--accent-dim:rgba(232,197,71,0.12);--accent-glow:rgba(232,197,71,0.06);
    --text:#F0F0F0;--text-dim:#666;--text-mid:#999;
    --green:#4ADE80;--green-dim:rgba(74,222,128,0.12);
    --blue:#60A5FA;--blue-dim:rgba(96,165,250,0.12);
    --red:#F87171;--red-dim:rgba(248,113,113,0.12);
    --orange:#FB923C;--orange-dim:rgba(251,146,60,0.12);
    --purple:#C084FC;--purple-dim:rgba(192,132,252,0.12);
  }
  html,body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;font-size:14px;-webkit-font-smoothing:antialiased}
  input,select,button{font-family:inherit}
  input:focus,select:focus{outline:none;border-color:var(--accent)!important;box-shadow:0 0 0 3px var(--accent-glow)}
  select option{background:#1C1C1C}
  ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
  .app{display:flex;flex-direction:column;min-height:100vh}
  /* Header */
  .header{border-bottom:1px solid var(--border);padding:0 28px;position:sticky;top:0;background:rgba(13,13,13,0.95);backdrop-filter:blur(8px);z-index:100}
  .header-inner{max-width:1040px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:56px}
  .logo{display:flex;align-items:center;gap:12px}
  .logo-bar{background:var(--accent);width:4px;height:26px;border-radius:2px}
  .logo-text{display:flex;flex-direction:column;gap:1px}
  .logo-name{font-family:'Syne',sans-serif;font-weight:800;font-size:14px;letter-spacing:.06em}
  .logo-sub{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-dim);letter-spacing:.14em}
  .header-right{display:flex;align-items:center;gap:12px}
  .header-user{display:flex;align-items:center;gap:10px;background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:5px 14px}
  .header-user-name{font-family:'Syne',sans-serif;font-weight:600;font-size:12px}
  .header-user-role{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-dim)}
  .btn-signout{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:11px;font-family:'JetBrains Mono',monospace;transition:color .15s;padding:0}
  .btn-signout:hover{color:var(--red)}
  .sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0;display:inline-block}
  .sync-dot.syncing{background:var(--accent);animation:pulse 1s infinite}
  .sync-dot.error{background:var(--red)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  /* Tabs */
  .tabs{border-bottom:1px solid var(--border);padding:0 28px}
  .tabs-inner{max-width:1040px;margin:0 auto;display:flex}
  .tab{background:none;border:none;border-bottom:2px solid transparent;padding:14px 20px;font-family:'Syne',sans-serif;font-weight:700;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);cursor:pointer;transition:all .2s;margin-bottom:-1px}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent)}
  .tab:hover:not(.active){color:var(--text-mid)}
  /* Sub-tabs */
  .subtabs{display:flex;gap:4px;margin-bottom:28px}
  .subtab{background:none;border:1px solid var(--border);color:var(--text-dim);padding:7px 16px;font-family:'Syne',sans-serif;font-weight:700;font-size:11px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border-radius:5px;transition:all .2s}
  .subtab.active{background:var(--accent-dim);border-color:rgba(232,197,71,.4);color:var(--accent)}
  .subtab:hover:not(.active){border-color:var(--text-dim);color:var(--text-mid)}
  /* Content */
  .content{max-width:1040px;margin:0 auto;padding:36px 28px;flex:1;width:100%}
  .content-narrow{max-width:680px;margin:0 auto;padding:36px 28px;flex:1;width:100%}
  /* Fields */
  .field-label{display:block;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-dim);letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px}
  .field-input{width:100%;background:var(--card2);border:1px solid var(--border);color:var(--text);font-size:14px;padding:10px 14px;border-radius:5px;transition:border-color .2s,box-shadow .2s}
  .field-input::placeholder{color:var(--text-dim)}
  .field-input[type="date"]{color-scheme:dark}
  .field-input[type="url"]{color:var(--blue)}
  .toggle-group{display:flex;background:var(--card2);border:1px solid var(--border);border-radius:5px;overflow:hidden}
  .toggle-btn{flex:1;padding:9px 8px;border:none;background:none;cursor:pointer;font-size:13px;color:var(--text-dim);transition:all .15s}
  .toggle-btn.active{color:var(--accent);background:var(--accent-dim);font-weight:500}
  /* Buttons */
  .btn-primary{background:var(--accent);color:#0D0D0D;border:none;padding:12px 28px;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;letter-spacing:.06em;cursor:pointer;border-radius:5px;transition:opacity .2s;width:100%}
  .btn-primary:hover:not(:disabled){opacity:.88}
  .btn-primary:disabled{opacity:.35;cursor:not-allowed}
  .btn-ghost{background:none;border:1px solid var(--border);color:var(--text-mid);padding:9px 18px;font-size:13px;cursor:pointer;border-radius:5px;transition:all .2s}
  .btn-ghost:hover{border-color:var(--text-dim);color:var(--text)}
  .btn-ghost-sm{background:none;border:1px solid var(--border);color:var(--text-mid);padding:7px 14px;font-size:12px;cursor:pointer;border-radius:4px;transition:all .2s}
  .btn-ghost-sm:hover{border-color:var(--accent);color:var(--accent)}
  .btn-remove{background:none;border:1px solid transparent;color:var(--text-dim);padding:4px 10px;font-size:12px;cursor:pointer;border-radius:4px;transition:all .15s}
  .btn-remove:hover{border-color:var(--red-dim);color:var(--red);background:var(--red-dim)}
  .btn-edit{background:none;border:1px solid var(--border);color:var(--text-mid);padding:4px 10px;font-size:11px;font-family:'JetBrains Mono',monospace;cursor:pointer;border-radius:4px;transition:all .15s}
  .btn-edit:hover{border-color:var(--accent);color:var(--accent)}
  .btn-del{background:none;border:1px solid transparent;color:var(--text-dim);padding:4px 10px;font-size:11px;font-family:'JetBrains Mono',monospace;cursor:pointer;border-radius:4px;transition:all .15s}
  .btn-del:hover{border-color:var(--red-dim);color:var(--red);background:var(--red-dim)}
  .btn-note{background:none;border:1px solid var(--border);color:var(--text-dim);padding:4px 10px;font-size:11px;font-family:'JetBrains Mono',monospace;cursor:pointer;border-radius:4px;transition:all .15s}
  .btn-note:hover{border-color:var(--purple);color:var(--purple);background:var(--purple-dim)}
  .btn-note.has-note{border-color:rgba(192,132,252,.4);color:var(--purple);background:var(--purple-dim)}
  /* Cards */
  .task-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:18px;margin-bottom:12px}
  .task-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
  .task-num{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-dim);letter-spacing:.1em}
  .stat-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:20px}
  .stat-num{font-family:'JetBrains Mono',monospace;font-size:38px;font-weight:500;color:var(--accent);line-height:1;margin-bottom:6px}
  .stat-label{font-size:12px;color:var(--text-dim)}
  /* Client cards */
  .client-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:20px;transition:border-color .2s}
  .client-card:hover{border-color:#333}
  .client-card-name{font-family:'Syne',sans-serif;font-weight:700;font-size:16px;margin-bottom:12px}
  .client-stat-row{display:flex;gap:16px;margin-bottom:12px;flex-wrap:wrap}
  .client-stat{display:flex;flex-direction:column;gap:3px}
  .client-stat-val{font-family:'JetBrains Mono',monospace;font-size:22px;color:var(--accent);line-height:1}
  .client-stat-lbl{font-size:11px;color:var(--text-dim)}
  .client-editors{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .editor-tag{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:3px 10px;font-size:11px;color:var(--text-mid);font-family:'JetBrains Mono',monospace}
  .clients-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;margin-bottom:28px}
  /* Capacity */
  .capacity-section{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:24px}
  .capacity-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
  .capacity-title{font-family:'Syne',sans-serif;font-weight:700;font-size:13px}
  .capacity-headline{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:500;color:var(--accent)}
  .capacity-headline.low{color:var(--red)}
  .capacity-headline.mid{color:var(--orange)}
  .capacity-headline.high{color:var(--green)}
  .capacity-rows{display:flex;flex-direction:column;gap:12px}
  .capacity-row{display:flex;align-items:center;gap:12px}
  .capacity-name{width:110px;font-family:'Syne',sans-serif;font-weight:600;font-size:13px;flex-shrink:0}
  .capacity-bar-wrap{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
  .capacity-bar-fill{height:100%;border-radius:3px;transition:width .6s ease}
  .capacity-nums{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim);width:80px;text-align:right;flex-shrink:0}
  .capacity-pct{font-family:'JetBrains Mono',monospace;font-size:11px;width:36px;text-align:right;flex-shrink:0}
  /* Table */
  .data-table{width:100%;background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;border-collapse:collapse}
  .data-table th{padding:11px 16px;text-align:left;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-dim);letter-spacing:.12em;font-weight:400;border-bottom:1px solid var(--border)}
  .data-table td{padding:13px 16px;border-bottom:1px solid var(--border)}
  .data-table tr:last-child td{border-bottom:none}
  .data-table tr:hover td{background:rgba(255,255,255,.01)}
  .data-num{font-family:'JetBrains Mono',monospace;font-size:15px}
  .data-name{font-family:'Syne',sans-serif;font-weight:600;font-size:14px}
  .role-tag{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-dim)}
  /* Badges */
  .badge{display:inline-block;padding:2px 7px;border-radius:3px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.06em;text-transform:uppercase}
  .badge-client{background:var(--green-dim);color:var(--green)}
  .badge-internal{background:var(--blue-dim);color:var(--blue)}
  .badge-video{background:var(--accent-dim);color:var(--accent)}
  .badge-graphic{background:var(--red-dim);color:var(--red)}
  /* Section */
  .section-title{font-family:'Syne',sans-serif;font-weight:700;font-size:20px}
  .section-sub{font-size:13px;color:var(--text-dim);margin-top:4px}
  .table-header-bar{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px}
  .table-title{font-family:'Syne',sans-serif;font-weight:700;font-size:13px}
  /* Log items */
  .log-item{padding:14px 20px;border-bottom:1px solid var(--border)}
  .log-item:last-child{border-bottom:none}
  .log-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:6px}
  .log-name{font-family:'Syne',sans-serif;font-weight:600;font-size:14px}
  .log-date{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-dim)}
  .log-actions{display:flex;gap:6px;flex-wrap:wrap}
  .log-tasks{display:flex;flex-wrap:wrap;gap:6px}
  .log-task-pill{display:flex;align-items:center;gap:6px;background:var(--card2);border-radius:5px;padding:5px 10px}
  .log-task-name{font-size:13px;color:var(--text-mid)}
  .log-task-qty{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--accent)}
  .drive-link{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--blue);text-decoration:none}
  .drive-link:hover{text-decoration:underline}
  /* Manager note */
  .manager-note-display{margin-top:8px;background:var(--purple-dim);border:1px solid rgba(192,132,252,.2);border-radius:5px;padding:8px 12px;font-size:12px;color:var(--purple);display:flex;align-items:flex-start;gap:8px}
  .manager-note-icon{flex-shrink:0;font-size:13px}
  .manager-note-text{flex:1;line-height:1.5}
  .note-edit-row{margin-top:8px;display:flex;gap:8px}
  .note-edit-input{flex:1;background:var(--card2);border:1px solid rgba(192,132,252,.4);color:var(--text);font-size:13px;padding:8px 12px;border-radius:5px;transition:border-color .2s}
  .note-edit-input:focus{outline:none;border-color:var(--purple)!important;box-shadow:0 0 0 3px rgba(192,132,252,.1)}
  .note-edit-input::placeholder{color:var(--text-dim)}
  /* Messages */
  .success-msg{background:var(--green-dim);border:1px solid rgba(74,222,128,.25);border-radius:6px;padding:12px 16px;color:var(--green);font-size:14px;margin-bottom:16px}
  .error-msg{background:var(--red-dim);border:1px solid rgba(248,113,113,.25);border-radius:6px;padding:12px 16px;color:var(--red);font-size:14px;margin-bottom:16px}
  .editing-banner{background:var(--orange-dim);border:1px solid rgba(251,146,60,.3);border-radius:6px;padding:10px 16px;color:var(--orange);font-size:13px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
  /* Auth */
  .auth-screen{max-width:380px;margin:50px auto}
  .auth-title{font-family:'Syne',sans-serif;font-weight:700;font-size:22px;margin-bottom:6px}
  .auth-sub{color:var(--text-dim);font-size:14px;margin-bottom:28px}
  .member-grid{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
  .member-btn{background:var(--card);border:1px solid var(--border);color:var(--text);padding:14px 18px;border-radius:8px;cursor:pointer;text-align:left;transition:border-color .15s;display:flex;justify-content:space-between;align-items:center;width:100%}
  .member-btn:hover{border-color:var(--accent)}
  .member-btn-name{font-family:'Syne',sans-serif;font-weight:600;font-size:14px}
  .member-btn-role{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-dim)}
  .pin-input{width:100%;background:var(--card2);border:1px solid var(--border);color:var(--text);font-size:28px;letter-spacing:.5em;text-align:center;padding:14px;border-radius:5px;margin-bottom:12px;transition:border-color .2s,box-shadow .2s;font-family:'JetBrains Mono',monospace}
  .pin-input:focus{outline:none;border-color:var(--accent)!important;box-shadow:0 0 0 3px var(--accent-glow)}
  .pin-hint{font-family:'JetBrains Mono',monospace;font-size:10px;color:#333;text-align:center;margin-top:12px}
  .back-btn{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:13px;display:flex;align-items:center;gap:6px;margin-bottom:20px;padding:0;transition:color .15s}
  .back-btn:hover{color:var(--text)}
  /* Modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
  .modal{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:28px;max-width:420px;width:100%}
  .modal-title{font-family:'Syne',sans-serif;font-weight:700;font-size:18px;margin-bottom:8px}
  .modal-sub{color:var(--text-dim);font-size:14px;margin-bottom:20px;line-height:1.5}
  .modal-summary{background:var(--card2);border-radius:8px;padding:14px;margin-bottom:20px}
  .modal-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:13px}
  .modal-row:last-child{border-bottom:none}
  .modal-label{color:var(--text-dim)}
  .modal-val{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--accent)}
  .modal-actions{display:flex;gap:10px}
  .modal-actions .btn-ghost{flex:1}
  .modal-actions .btn-primary{flex:2}
  /* Settings */
  .settings-section{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:20px}
  .settings-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
  .settings-title{font-family:'Syne',sans-serif;font-weight:700;font-size:14px}
  .settings-hint{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-dim)}
  .settings-body{padding:20px}
  .pill-list{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;min-height:32px}
  .pill-item{display:flex;align-items:center;gap:6px;background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:13px}
  .pill-role{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-dim)}
  .pill-remove{background:none;border:none;cursor:pointer;color:var(--text-dim);font-size:14px;padding:0 0 0 4px;line-height:1;transition:color .15s}
  .pill-remove:hover{color:var(--red)}
  .add-row{display:flex;gap:8px}
  .add-row .field-input{flex:1}
  .pin-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
  .pin-row:last-child{border-bottom:none}
  .pin-row-name{flex:1;font-family:'Syne',sans-serif;font-weight:600;font-size:14px}
  .pin-row-role{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-dim);width:60px}
  .pin-row-input{width:100px;background:var(--card2);border:1px solid var(--border);color:var(--text);font-size:14px;padding:7px 10px;border-radius:5px;font-family:'JetBrains Mono',monospace;letter-spacing:.2em;text-align:center;transition:border-color .2s}
  .pin-row-input:focus{outline:none;border-color:var(--accent)!important}
  .capacity-target-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
  .capacity-target-row:last-child{border-bottom:none}
  .capacity-target-label{flex:1;font-size:13px}
  .capacity-target-sub{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-dim)}
  .capacity-target-input{width:70px;background:var(--card2);border:1px solid var(--border);color:var(--text);font-size:14px;padding:7px 10px;border-radius:5px;font-family:'JetBrains Mono',monospace;text-align:center;transition:border-color .2s}
  .capacity-target-input:focus{outline:none;border-color:var(--accent)!important}
  /* Summary report */
  .summary-report{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden}
  .summary-top{padding:28px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:16px}
  .summary-agency{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;letter-spacing:.06em;color:var(--accent)}
  .summary-period{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim);margin-top:4px}
  .summary-actions{display:flex;gap:8px;flex-wrap:wrap}
  .summary-section{padding:20px 28px;border-bottom:1px solid var(--border)}
  .summary-section:last-child{border-bottom:none}
  .summary-section-title{font-family:'Syne',sans-serif;font-weight:700;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);margin-bottom:14px}
  .summary-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:0}
  .summary-kpi{background:var(--card2);border-radius:6px;padding:14px}
  .summary-kpi-num{font-family:'JetBrains Mono',monospace;font-size:26px;color:var(--accent);line-height:1;margin-bottom:4px}
  .summary-kpi-lbl{font-size:11px;color:var(--text-dim)}
  .summary-table{width:100%;border-collapse:collapse}
  .summary-table th{padding:8px 12px;text-align:left;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-dim);letter-spacing:.1em;border-bottom:1px solid var(--border)}
  .summary-table td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:13px}
  .summary-table tr:last-child td{border-bottom:none}
  .top-performer{background:var(--accent-dim);border:1px solid rgba(232,197,71,.2);border-radius:6px;padding:14px 18px;display:flex;align-items:center;gap:14px}
  .top-performer-icon{font-size:24px}
  .top-performer-name{font-family:'Syne',sans-serif;font-weight:700;font-size:16px}

async function sb(path,method="GET",body=null){
  const r=await fetch(`${SURL}/rest/v1/${path}`,{method,headers:{"apikey":SKEY,"Authorization":`Bearer ${SKEY}`,"Content-Type":"application/json","Prefer":method==="POST"?"return=representation":""},body:body?JSON.stringify(body):null});
  if(!r.ok)throw new Error(await r.text());
  const t=await r.text();return t?JSON.parse(t):null;
}

// ── Utils ─────────────────────────────────────────────────────────────────────
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2);
const today=()=>new Date().toISOString().slice(0,10);
const fmtDate=d=>d?new Date(d+"T00:00:00").toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"}):"—";
const fmtDateShort=d=>d?new Date(d+"T00:00:00").toLocaleDateString("en-GB",{day:"numeric",month:"short"}):"—";
const monthLabel=ym=>{const[y,m]=ym.split("-");return new Date(+y,+m-1,1).toLocaleDateString("en-GB",{month:"long",year:"numeric"});};
const getMonths=()=>{const o=[],n=new Date();for(let i=0;i<6;i++){const d=new Date(n.getFullYear(),n.getMonth()-i,1);o.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`);}return o;};
const weekStart=date=>{const d=new Date(date),day=d.getDay(),diff=d.getDate()-day+(day===0?-6:1);d.setDate(diff);return d.toISOString().slice(0,10);};
const weekEnd=ws=>{const d=new Date(ws+"T00:00:00");d.setDate(d.getDate()+6);return d.toISOString().slice(0,10);};
const getWeeks=()=>{const o=[],n=new Date();for(let i=0;i<12;i++){const d=new Date(n);d.setDate(d.getDate()-i*7);o.push(weekStart(d));}return[...new Set(o)];};
const fmtWeek=ws=>{const s=new Date(ws+"T00:00:00"),e=new Date(ws+"T00:00:00");e.setDate(e.getDate()+6);const f=d=>d.toLocaleDateString("en-GB",{day:"numeric",month:"short"});return`${f(s)} – ${f(e)}`;};
const getDays=()=>{const o=[],n=new Date();for(let i=0;i<30;i++){const d=new Date(n);d.setDate(d.getDate()-i);o.push(d.toISOString().slice(0,10));}return o;};
const emptyTask=()=>({id:uid(),project:"",projectType:"client",contentType:"video",quantity:1,driveLink:"",notes:""});
const norm=e=>({id:e.id,memberId:e.member_id,memberName:e.member_name,role:e.role,date:e.date,tasks:e.tasks||[],submittedAt:e.submitted_at,managerNote:e.manager_note||""});
// Count working days (Mon-Fri) in a month
function workingDaysInMonth(ym){
  const[y,m]=ym.split("-").map(Number);
  const days=new Date(y,m,0).getDate();
  let count=0;
  for(let i=1;i<=days;i++){const d=new Date(y,m-1,i).getDay();if(d!==0&&d!==6)count++;}
  return count;
}

// ── Stats ─────────────────────────────────────────────────────────────────────
function getFiltered(){
  if(S.view==="daily")return{filtered:S.entries.filter(e=>e.date===S.day),label:fmtDate(S.day)};
  if(S.view==="weekly"){const we=weekEnd(S.week);return{filtered:S.entries.filter(e=>e.date>=S.week&&e.date<=we),label:fmtWeek(S.week)};}
  return{filtered:S.entries.filter(e=>e.date&&e.date.startsWith(S.month)),label:monthLabel(S.month)};
}
function memberStats(filtered){
  return S.config.team.map(m=>{
    const me=filtered.filter(e=>e.memberId===m.id),all=me.flatMap(e=>e.tasks||[]);
    const videos=all.filter(t=>t.contentType==="video").reduce((a,t)=>a+Number(t.quantity||0),0);
    const graphics=all.filter(t=>t.contentType==="graphic").reduce((a,t)=>a+Number(t.quantity||0),0);
    const cw=all.filter(t=>t.projectType==="client").reduce((a,t)=>a+Number(t.quantity||0),0);
    const iw=all.filter(t=>t.projectType==="internal").reduce((a,t)=>a+Number(t.quantity||0),0);
    const days=new Set(me.map(e=>e.date)).size;
    return{...m,videos,graphics,total:videos+graphics,clientWork:cw,internalWork:iw,daysLogged:days};
  });
}
function clientStats(filtered){
  const map={};
  filtered.forEach(entry=>{
    (entry.tasks||[]).filter(t=>t.projectType==="client"&&t.project).forEach(t=>{
      if(!map[t.project])map[t.project]={name:t.project,videos:0,graphics:0,total:0,editors:new Set(),days:new Set()};
      const c=map[t.project];
      if(t.contentType==="video")c.videos+=Number(t.quantity||0);
      else c.graphics+=Number(t.quantity||0);
      c.total+=Number(t.quantity||0);
      c.editors.add(entry.memberName);
      c.days.add(entry.date);
    });
  });
  return Object.values(map).map(c=>({...c,editors:[...c.editors],days:c.days.size})).sort((a,b)=>b.total-a.total);
}
function capacityStats(filtered,label){
  // Determine number of working days in period
  let wDays=1;
  if(S.view==="monthly")wDays=workingDaysInMonth(S.month);
  else if(S.view==="weekly")wDays=5;
  else wDays=1;
  const ct=S.config.capacity_targets||{editor:3,designer:5};
  const ms=memberStats(filtered);
  const rows=ms.map(m=>{
    const target=(ct[m.role]||3)*wDays;
    const pct=target>0?Math.min(Math.round((m.total/target)*100),999):0;
    return{...m,target,pct};
  });
  const totalActual=rows.reduce((a,r)=>a+r.total,0);
  const totalCap=rows.reduce((a,r)=>a+r.target,0);
  const overallPct=totalCap>0?Math.min(Math.round((totalActual/totalCap)*100),999):0;
  return{rows,overallPct,totalActual,totalCap};
}

// ── DOM helpers ───────────────────────────────────────────────────────────────
function el(tag,a,...ch){
  const e=document.createElement(tag);
  if(a)Object.entries(a).forEach(([k,v])=>{
    if(k==="class")e.className=v;
    else if(k==="style"&&typeof v==="object")Object.assign(e.style,v);
    else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  });
  ch.flat(Infinity).forEach(c=>{if(c==null||c===false)return;e.appendChild(c instanceof Node?c:document.createTextNode(String(c)));});
  return e;
}
const d=(cls,...ch)=>el("div",{class:cls},...ch);
const sp=(cls,t)=>el("span",{class:cls},t);

    wrap.appendChild(pill);

  return wrap;
}
function periodControls(){

  const vt=d("toggle-group");
  [["daily","Day"],["weekly","Week"],["monthly","Month"]].forEach(([v,l])=>vt.appendChild(el("button",{class:`toggle-btn${S.view===v?" active":""}`,style:{padding:"8px 14px"},onClick:()=>set({view:v})},l)));
  ctrl.appendChild(vt);
  if(S.view==="monthly"){
    const ms=el("select",{class:"field-input",style:{width:"auto",cursor:"pointer"}});

    ms.value=S.month;ms.addEventListener("change",e=>set({month:e.target.value}));ctrl.appendChild(ms);
  }else if(S.view==="weekly"){

    ws.value=S.week;ws.addEventListener("change",e=>set({week:e.target.value}));ctrl.appendChild(ws);
  }else{
    const ds=el("select",{class:"field-input",style:{width:"auto",cursor:"pointer"}});
    getDays().forEach(dv=>{const o=el("option",{value:dv},fmtDate(dv)+(dv===today()?" (Today)":""));if(dv===S.day)o.selected=true;ds.appendChild(o);});
    ds.value=S.day;ds.addEventListener("change",e=>set({day:e.target.value}));ctrl.appendChild(ds);
  }
  return ctrl;
}

    const c=d("summary-kpi");c.appendChild(el("div",{class:"summary-kpi-num"},String(k.n)));c.appendChild(el("div",{class:"summary-kpi-lbl"},k.l));kpis.appendChild(c);
  });
  kpiSec.appendChild(kpis);report.appendChild(kpiSec);

  // Top performer
  if(topPerformer&&topPerformer.total>0){
    const tpSec=d("summary-section");
    tpSec.appendChild(el("p",{class:"summary-section-title"},"Top Performer"));
    const tp=d("top-performer");
    tp.appendChild(el("span",{class:"top-performer-icon"},"🏆"));
    const tpb=el("div",{});
    tpb.appendChild(el("div",{class:"top-performer-name"},topPerformer.name));
    tpb.appendChild(el("div",{class:"top-performer-sub"},`${topPerformer.total} pieces · ${topPerformer.videos} videos · ${topPerformer.graphics} graphics · ${topPerformer.daysLogged} days logged`));
    tp.appendChild(tpb);tpSec.appendChild(tp);report.appendChild(tpSec);
  }

  // Team breakdown
  const tbSec=d("summary-section");
  tbSec.appendChild(el("p",{class:"summary-section-title"},"Team Breakdown"));
  const tbl=el("table",{class:"summary-table"});
  tbl.appendChild(el("thead",{},el("tr",{},...["Team Member","Role","Videos","Graphics","Total","Client","Internal","Days Logged"].map(h=>el("th",{},h.toUpperCase())))));
  const tbody2=el("tbody");
  ms.forEach(m=>{
    const tr=el("tr");if(m.total===0)tr.style.opacity="0.4";
    [m.name,m.role,m.videos,m.graphics,m.total,m.clientWork,m.internalWork,m.daysLogged+" days"].forEach((v,i)=>{
      const td=el("td",{},String(v));
      if(i===0)td.style.fontFamily="Syne,sans-serif";if(i===0)td.style.fontWeight="600";
      if(i===4)td.style.fontWeight="700";
      tr.appendChild(td);
    });
    tbody2.appendChild(tr);
  });
  tbl.appendChild(tbody2);tbSec.appendChild(tbl);report.appendChild(tbSec);

  // Client summary
  if(cs2.length>0){
    const csSec=d("summary-section");
    csSec.appendChild(el("p",{class:"summary-section-title"},"Client Summary"));
    const ctbl=el("table",{class:"summary-table"});
    ctbl.appendChild(el("thead",{},el("tr",{},...["Client","Videos","Graphics","Total Pieces","Active Days"].map(h=>el("th",{},h.toUpperCase())))));
    const ctbody=el("tbody");
    cs2.forEach(c=>{
      const tr=el("tr");
      [c.name,c.videos,c.graphics,c.total,c.days+" days"].forEach((v,i)=>{
        const td=el("td",{},String(v));if(i===0){td.style.fontFamily="Syne,sans-serif";td.style.fontWeight="600";}if(i===3)td.style.fontWeight="700";tr.appendChild(td);
      });
      ctbody.appendChild(tr);
    });
    ctbl.appendChild(ctbody);csSec.appendChild(ctbl);report.appendChild(csSec);
  }

  wrap.appendChild(report);
  return wrap;
}

// ── Dashboard ─────────────────────────────────────────────────────────────────
function renderDash(){
  const{filtered,label}=getFiltered();
  const wrap=d("fade-in");

  // Top row
  const top=el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"20px",flexWrap:"wrap",gap:"14px"}});
  const left=d("");
  left.appendChild(el("h2",{class:"section-title"},"Dashboard"));
  left.appendChild(el("p",{class:"section-sub",style:{marginTop:"4px"}},`${filtered.length} submissions · ${label}`));
  top.appendChild(left);
  top.appendChild(periodControls());
  wrap.appendChild(top);

  // Sub-tabs
  const st=d("subtabs");
  [["overview","Overview"],["clients","Clients"],["summary","Monthly Summary"]].forEach(([id,label2])=>{
    st.appendChild(el("button",{class:`subtab${S.dashTab===id?" active":""}`,onClick:()=>set({dashTab:id})},label2));
  });
  wrap.appendChild(st);

  if(S.dashTab==="overview")wrap.appendChild(renderOverview(filtered,label));
  else if(S.dashTab==="clients")wrap.appendChild(renderClients(filtered,label));
  else if(S.dashTab==="summary")wrap.appendChild(renderSummary(filtered,label));

  return el("div",{class:"content"},wrap);
}

// ── Settings ──────────────────────────────────────────────────────────────────
function renderSettings(){
  const wrap=d("fade-in");
  const th=d("");th.style.marginBottom="28px";
  th.appendChild(el("h2",{class:"section-title"},"Settings"));
  th.appendChild(el("p",{class:"section-sub",style:{marginTop:"4px"}},"All changes sync to cloud instantly."));
  wrap.appendChild(th);
  if(S.saved)wrap.appendChild(d("success-msg","✓ Settings saved to cloud."));
  if(S.saveErr)wrap.appendChild(d("error-msg","⚠ "+S.saveErr));

  // Team members
  const ts=d("settings-section");ts.appendChild(el("div",{class:"settings-header"},el("span",{class:"settings-title"},"Team Members")));
  const tb=d("settings-body"),pl=d("pill-list");
  S.config.team.forEach(m=>{const pill=d("pill-item");pill.appendChild(el("span",{},m.name));pill.appendChild(el("span",{class:"pill-role"},m.role));pill.appendChild(el("button",{class:"pill-remove",onClick:()=>rmMember(m.id)},"×"));pl.appendChild(pill);});
  tb.appendChild(pl);
  const ar=d("add-row"),ni2=el("input",{class:"field-input",type:"text",placeholder:"Full name…",value:S.newName});
  ni2.addEventListener("input",e=>{S.newName=e.target.value;});ni2.addEventListener("keydown",e=>{if(e.key==="Enter")addMember();});
  const rs=el("select",{class:"field-input",style:{width:"130px",flexShrink:"0",cursor:"pointer"}});
  ["editor","designer","manager"].forEach(r=>{const o=el("option",{value:r},r);if(r===S.newRole)o.selected=true;rs.appendChild(o);});
  rs.value=S.newRole;rs.addEventListener("change",e=>{S.newRole=e.target.value;});
  ar.appendChild(ni2);ar.appendChild(rs);ar.appendChild(el("button",{class:"btn-ghost-sm",onClick:addMember},"+ Add"));
  tb.appendChild(ar);ts.appendChild(tb);wrap.appendChild(ts);

  // Member PINs
  const mps=d("settings-section");
  const mph=el("div",{class:"settings-header"});mph.appendChild(el("span",{class:"settings-title"},"Member PINs"));mph.appendChild(el("span",{class:"settings-hint"},"Each person's login PIN"));
  mps.appendChild(mph);
  const mpb=d("settings-body");
  S.config.team.forEach(m=>{
    const row=d("pin-row");
    row.appendChild(el("div",{class:"pin-row-name"},m.name));
    row.appendChild(el("div",{class:"pin-row-role"},m.role));
    const pi=el("input",{class:"pin-row-input",type:"text",maxlength:"10",placeholder:"0000",value:S.pinEdits[m.id]!==undefined?S.pinEdits[m.id]:(m.memberPin||"0000")});
    pi.addEventListener("input",e=>{S.pinEdits={...S.pinEdits,[m.id]:e.target.value};});
    row.appendChild(pi);mpb.appendChild(row);
  });
  mpb.appendChild(el("div",{style:{marginTop:"16px"}},el("button",{class:"btn-ghost-sm",onClick:savePins},"💾 Save all PINs")));
  mps.appendChild(mpb);wrap.appendChild(mps);

  // Capacity targets
  const caps=d("settings-section");
  const caph=el("div",{class:"settings-header"});caph.appendChild(el("span",{class:"settings-title"},"Daily Output Targets"));caph.appendChild(el("span",{class:"settings-hint"},"Pieces per person per working day"));
  caps.appendChild(caph);
  const capb=d("settings-body");
  const ct=S.config.capacity_targets||{editor:3,designer:5};
  const roles=[...new Set(S.config.team.map(m=>m.role))];
  roles.forEach(role=>{
    const row=d("capacity-target-row");
    const lft=el("div",{});
    lft.appendChild(el("div",{class:"capacity-target-label",style:{fontFamily:"Syne,sans-serif",fontWeight:"600"}},role.charAt(0).toUpperCase()+role.slice(1)));
    lft.appendChild(el("div",{class:"capacity-target-sub"},"videos or graphics per day"));
    row.appendChild(lft);
    const inp=el("input",{class:"capacity-target-input",type:"number",min:"1",max:"99",value:S.capEdits[role]!==undefined?S.capEdits[role]:(ct[role]||3)});
    inp.addEventListener("input",e=>{S.capEdits={...S.capEdits,[role]:e.target.value};});
    row.appendChild(inp);capb.appendChild(row);
  });
  capb.appendChild(el("div",{style:{marginTop:"16px"}},el("button",{class:"btn-ghost-sm",onClick:saveCapacity},"💾 Save Targets")));
  caps.appendChild(capb);wrap.appendChild(caps);

  // Clients
  const cs=d("settings-section");cs.appendChild(el("div",{class:"settings-header"},el("span",{class:"settings-title"},"Client Names")));
  const cb=d("settings-body"),cp2=d("pill-list");
  S.config.clients.forEach(c=>{const pill=d("pill-item");pill.appendChild(el("span",{},c));pill.appendChild(el("button",{class:"pill-remove",onClick:()=>rmClient(c)},"×"));cp2.appendChild(pill);});
  cb.appendChild(cp2);
  const cr=d("add-row"),ci=el("input",{class:"field-input",type:"text",placeholder:"Client name…",value:S.newClient});
  ci.addEventListener("input",e=>{S.newClient=e.target.value;});ci.addEventListener("keydown",e=>{if(e.key==="Enter")addClient();});
  cr.appendChild(ci);cr.appendChild(el("button",{class:"btn-ghost-sm",onClick:addClient},"+ Add"));
  cb.appendChild(cr);cs.appendChild(cb);wrap.appendChild(cs);

  // Internal
  const is=d("settings-section");is.appendChild(el("div",{class:"settings-header"},el("span",{class:"settings-title"},"Internal Projects")));
  const ib=d("settings-body"),ip=d("pill-list");
  S.config.internal_projects.forEach(p=>{const pill=d("pill-item");pill.appendChild(el("span",{},p));pill.appendChild(el("button",{class:"pill-remove",onClick:()=>rmInternal(p)},"×"));ip.appendChild(pill);});
  ib.appendChild(ip);
  const ir=d("add-row"),ii=el("input",{class:"field-input",type:"text",placeholder:"Internal project name…",value:S.newInternal});
  ii.addEventListener("input",e=>{S.newInternal=e.target.value;});ii.addEventListener("keydown",e=>{if(e.key==="Enter")addInternal();});
  ir.appendChild(ii);ir.appendChild(el("button",{class:"btn-ghost-sm",onClick:addInternal},"+ Add"));
  ib.appendChild(ir);is.appendChild(ib);wrap.appendChild(is);

  // Manager PIN
  const mp=d("settings-section");mp.appendChild(el("div",{class:"settings-header"},el("span",{class:"settings-title"},"Manager / Dashboard PIN")));
  const mpb2=d("settings-body"),mpg=d("grid-3");
  const p1=el("input",{class:"field-input",type:"password",placeholder:"New PIN",value:S.newMgrPin});p1.addEventListener("input",e=>{S.newMgrPin=e.target.value;});
  const p2=el("input",{class:"field-input",type:"password",placeholder:"Confirm PIN",value:S.newMgrPin2});p2.addEventListener("input",e=>{S.newMgrPin2=e.target.value;});p2.addEventListener("keydown",e=>{if(e.key==="Enter")changeMgrPin();});
  mpg.appendChild(fld("New PIN",p1));mpg.appendChild(fld("Confirm PIN",p2));
  mpg.appendChild(el("div",{style:{display:"flex",alignItems:"flex-end"}},el("button",{class:"btn-ghost-sm",style:{width:"100%"},onClick:changeMgrPin},"Update")));
  mpb2.appendChild(mpg);
  if(S.mgrPinMsg){const ok=S.mgrPinMsg.startsWith("ok:");mpb2.appendChild(el("p",{style:{marginTop:"10px",fontSize:"13px",color:ok?"var(--green)":"var(--red)"}},S.mgrPinMsg.slice(3)));}
  mp.appendChild(mpb2);wrap.appendChild(mp);
  return el("div",{class:"content"},wrap);
}

// ── Main render ───────────────────────────────────────────────────────────────
function render(){
  const root=document.getElementById("app");root.innerHTML="";
  if(!S.loaded){
    const app=d("app");app.appendChild(renderHeader());
    const ls=d("loading-screen");ls.appendChild(el("div",{class:"loading-spinner"}));ls.appendChild(el("span",{class:"loading-text"},"Connecting to cloud…"));
    app.appendChild(el("div",{class:"content"},ls));root.appendChild(app);return;
  }
  const app=d("app");app.appendChild(renderHeader());
  const tabsEl=el("div",{class:"tabs"}),tabsIn=el("div",{class:"tabs-inner"});
  [["log","Log Work"],["dash","Dashboard"],["settings","⚙ Settings"]].forEach(([id,label])=>tabsIn.appendChild(el("button",{class:`tab${S.tab===id?" active":""}`,onClick:()=>set({tab:id})},label)));
  tabsEl.appendChild(tabsIn);app.appendChild(tabsEl);
  if(S.tab==="log")app.appendChild(renderLog());
  else if(S.tab==="dash")app.appendChild(S.managerOk?renderDash():renderMgrPin());
  else if(S.tab==="settings")app.appendChild(S.managerOk?renderSettings():renderMgrPin());
  if(S.confirm)app.appendChild(renderModal());
  root.appendChild(app);
}

init();
</script>
